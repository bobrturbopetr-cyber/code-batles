<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBattles | Платформа для программистов</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
            background: #e8edf2;
            color: #2c3e50;
        }

        /* HEADER - сине-серый как Informatics */
        .header {
            background: #2c3e50;
            border-bottom: 3px solid #1abc9c;
            padding: 12px 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: #ecf0f1;
        }

        .logo span {
            color: #1abc9c;
        }

        .nav-links {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .nav-link {
            color: #ecf0f1;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }

        .nav-link:hover, .nav-link.active {
            background: #1abc9c;
            color: #2c3e50;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1a252f;
            padding: 5px 16px;
            border-radius: 40px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #1abc9c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #2c3e50;
        }

        .login-btn, .logout-btn {
            background: #1abc9c;
            border: none;
            padding: 6px 18px;
            border-radius: 25px;
            color: #2c3e50;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-btn:hover, .logout-btn:hover {
            background: #16a085;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* Карточки задач */
        .problem-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .problem-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: 0.2s;
            border-left: 4px solid #1abc9c;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .problem-card.solved {
            border-left-color: #27ae60;
            background: #f0fff4;
        }

        .problem-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.12);
        }

        .difficulty {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin: 8px 0;
        }
        .easy { background: #d4edda; color: #155724; }
        .medium { background: #fff3cd; color: #856404; }
        .hard { background: #f8d7da; color: #721c24; }

        /* Редактор */
        .editor-panel {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .problem-description {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 10px;
            margin: 15px 0;
        }

        textarea {
            width: 100%;
            padding: 15px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin: 10px 0;
        }

        textarea:focus {
            outline: none;
            border-color: #1abc9c;
        }

        .btn-submit, .btn-run {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
            transition: 0.2s;
        }

        .btn-submit {
            background: #27ae60;
            color: white;
        }

        .btn-run {
            background: #3498db;
            color: white;
        }

        .btn-submit:hover, .btn-run:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }

        /* Рейтинг */
        .rank-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .rank-row {
            display: grid;
            grid-template-columns: 60px 1fr 100px 100px;
            padding: 14px 20px;
            border-bottom: 1px solid #e9ecef;
        }

        .rank-row.header {
            background: #2c3e50;
            color: white;
            font-weight: bold;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .news-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        /* Модальные окна */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 32px;
            border-radius: 20px;
            width: 420px;
            max-width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .modal-content input {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: 0.2s;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #1abc9c;
        }

        .modal-content button {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
        }

        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
        }

        .success-msg {
            color: #27ae60;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
        }

        @media (max-width: 700px) {
            .header { flex-direction: column; text-align: center; }
            .rank-row { grid-template-columns: 40px 1fr 70px 70px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Code<span>Battles</span></div>
    <div class="nav-links">
        <a class="nav-link" onclick="showPage('home')">Главная</a>
        <a class="nav-link" onclick="showPage('problems')">Задачи</a>
        <a class="nav-link" onclick="showPage('news')">Новости</a>
        <a class="nav-link" onclick="showPage('rating')">Рейтинг</a>
    </div>
    <div class="user-info" id="userInfo">
        <div class="user-avatar" id="userAvatar">Г</div>
        <span id="userName">Гость</span>
        <button class="login-btn" id="loginBtn" onclick="openLoginModal()">Вход</button>
        <button class="logout-btn" id="logoutBtn" onclick="logout()" style="display:none;">Выйти</button>
    </div>
</div>

<div class="container">
    <div id="homePage" class="page"><div id="homeContent"></div></div>
    <div id="problemsPage" class="page"><div id="problemsContent"></div></div>
    <div id="newsPage" class="page"><div id="newsContent"></div></div>
    <div id="ratingPage" class="page"><div id="ratingContent"></div></div>
</div>

<!-- Модалка входа -->
<div id="loginModal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3><i class="fas fa-sign-in-alt"></i> Вход в CodeBattles</h3>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button class="btn-submit" onclick="login()" style="width:100%;">Войти</button>
        <button class="btn-run" onclick="switchToRegister()" style="width:100%; background:#6c757d;">Создать аккаунт</button>
        <button onclick="closeLoginModal()" style="width:100%; background:#e0e0e0; color:#333;">Отмена</button>
        <div id="loginMsg" class="error-msg"></div>
    </div>
</div>

<!-- Модалка регистрации (открывается сразу при заходе) -->
<div id="registerModal" class="modal" style="display:flex;">
    <div class="modal-content">
        <h3><i class="fas fa-user-plus"></i> Регистрация в CodeBattles</h3>
        <input type="text" id="regName" placeholder="Имя пользователя (никнейм)">
        <input type="email" id="regEmail" placeholder="Email">
        <input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)">
        <input type="password" id="regConfirm" placeholder="Подтвердите пароль">
        <button class="btn-submit" onclick="register()" style="width:100%;">Зарегистрироваться</button>
        <button class="btn-run" onclick="switchToLogin()" style="width:100%; background:#6c757d;">Уже есть аккаунт? Войти</button>
        <div id="regMsg" class="error-msg"></div>
    </div>
</div>

<script>
    // ===== JSONBIN — ГЛОБАЛЬНОЕ ХРАНИЛИЩЕ =====
    const JSONBIN_BIN_ID = "67c9f8e8ad19ca34f813add6";
    const JSONBIN_KEY = "$2a$10$upYPKLN3bcEbEuxmp.FS5OkJVaI42lsyjbqM/RubkWKNbtx2KRUlS";
    
    let currentUser = null;
    let globalData = null;
    
    async function loadGlobalData() {
        try {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                headers: { 'X-Master-Key': JSONBIN_KEY }
            });
            const data = await response.json();
            globalData = data.record;
            if (!globalData || !globalData.users) {
                initDefaultData();
                await saveGlobalData();
            }
            console.log("✅ Данные загружены, пользователей:", globalData.users.length);
        } catch(error) {
            console.log("Ошибка загрузки, создаю новые данные");
            initDefaultData();
        }
    }
    
    function initDefaultData() {
        globalData = {
            users: [],
            submissions: [],
            problems: [
                { id:1, title:"A + B", difficulty:"easy", points:100, testInput:"3 5", expectedOutput:"8", description:"Даны два числа. Найдите их сумму." },
                { id:2, title:"Четное или нечетное", difficulty:"easy", points:100, testInput:"7", expectedOutput:"нечетное", description:"Проверьте четность числа." },
                { id:3, title:"Факториал", difficulty:"medium", points:200, testInput:"5", expectedOutput:"120", description:"Вычислите n! (n ≤ 10)." },
                { id:4, title:"Максимум трех", difficulty:"medium", points:200, testInput:"10 25 15", expectedOutput:"25", description:"Найдите максимум." },
                { id:5, title:"Сумма массива", difficulty:"hard", points:300, testInput:"3\n1 2 3", expectedOutput:"6", description:"Сумма элементов массива." }
            ],
            news: [
                { title:"🎉 Добро пожаловать в CodeBattles!", date:"Сегодня", content:"Платформа запущена! Регистрируйтесь и решайте задачи." },
                { title:"🏆 Глобальный рейтинг", date:"Сегодня", content:"Все пользователи видят общую таблицу лидеров." },
                { title:"⚔️ Битвы кода", date:"Сегодня", content:"Решайте задачи и поднимайтесь в топ!" }
            ]
        };
    }
    
    async function saveGlobalData() {
        if (!globalData) return;
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
                body: JSON.stringify(globalData)
            });
            console.log("💾 Данные сохранены");
        } catch(e) { console.log("Ошибка сохранения", e); }
    }
    
    function openLoginModal() { 
        document.getElementById('loginModal').style.display = 'flex';
        document.getElementById('registerModal').style.display = 'none';
    }
    function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }
    function closeRegisterModal() { document.getElementById('registerModal').style.display = 'none'; }
    function switchToRegister() { closeLoginModal(); document.getElementById('registerModal').style.display = 'flex'; }
    function switchToLogin() { closeRegisterModal(); document.getElementById('loginModal').style.display = 'flex'; }
    
    async function login() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if (!globalData || !globalData.users) {
            await loadGlobalData();
        }
        
        const user = globalData.users.find(u => u.email === email && u.password === password);
        if (user) {
            currentUser = JSON.parse(JSON.stringify(user));
            delete currentUser.password;
            closeLoginModal();
            updateUI();
            renderAll();
            document.getElementById('loginMsg').innerHTML = '';
        } else {
            document.getElementById('loginMsg').innerHTML = '❌ Неверный email или пароль!';
        }
    }
    
    async function register() {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        
        if (!name || !email || !password) {
            document.getElementById('regMsg').innerHTML = '❌ Заполните все поля!';
            return;
        }
        if (password.length < 6) {
            document.getElementById('regMsg').innerHTML = '❌ Пароль должен быть не менее 6 символов!';
            return;
        }
        if (password !== confirm) {
            document.getElementById('regMsg').innerHTML = '❌ Пароли не совпадают!';
            return;
        }
        
        if (!globalData || !globalData.users) {
            await loadGlobalData();
        }
        
        if (globalData.users.find(u => u.email === email)) {
            document.getElementById('regMsg').innerHTML = '❌ Пользователь с таким email уже существует!';
            return;
        }
        if (globalData.users.find(u => u.name === name)) {
            document.getElementById('regMsg').innerHTML = '❌ Пользователь с таким именем уже существует!';
            return;
        }
        
        const newUser = {
            id: Date.now(),
            name: name,
            email: email,
            password: password,
            avatar: name.slice(0,2).toUpperCase(),
            points: 0,
            solved: [],
            rating: 1000,
            registeredAt: new Date().toISOString()
        };
        globalData.users.push(newUser);
        await saveGlobalData();
        
        currentUser = JSON.parse(JSON.stringify(newUser));
        delete currentUser.password;
        closeRegisterModal();
        updateUI();
        renderAll();
        document.getElementById('regMsg').innerHTML = '✅ Регистрация успешна!';
    }
    
    function logout() {
        currentUser = null;
        updateUI();
        renderAll();
    }
    
    function updateUI() {
        if (currentUser) {
            document.getElementById('userName').innerText = currentUser.name;
            document.getElementById('userAvatar').innerText = currentUser.avatar;
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
        } else {
            document.getElementById('userName').innerText = 'Гость';
            document.getElementById('userAvatar').innerText = 'Г';
            document.getElementById('loginBtn').style.display = 'inline-block';
            document.getElementById('logoutBtn').style.display = 'none';
        }
    }
    
    let selectedProblem = null;
    
    function renderHome() {
        if (!globalData) return;
        document.getElementById('homeContent').innerHTML = `
            <h1>Добро пожаловать в CodeBattles!</h1>
            <div class="stats-grid">
                <div class="stat-card"><i class="fas fa-users fa-2x"></i><h3>${globalData.users.length}</h3><p>участников</p></div>
                <div class="stat-card"><i class="fas fa-check-circle fa-2x"></i><h3>${globalData.submissions.length}</h3><p>решено задач</p></div>
                <div class="stat-card"><i class="fas fa-trophy fa-2x"></i><h3>${Math.max(...globalData.users.map(u=>u.points),0)}</h3><p>макс очков</p></div>
            </div>
            ${currentUser ? `<div class="stat-card"><h3>👤 Ваш профиль</h3><p>⭐ Очки: ${currentUser.points}</p><p>✅ Решено: ${currentUser.solved.length}</p><p>📊 Рейтинг: ${currentUser.rating}</p></div>` : '<p style="text-align:center; padding:40px;">🔒 <strong>Войдите или зарегистрируйтесь</strong>, чтобы решать задачи!</p>'}
        `;
    }
    
    function renderProblems() {
        if (!globalData) return;
        const grid = globalData.problems.map(prob => {
            const isSolved = currentUser && currentUser.solved.includes(prob.id);
            return `<div class="problem-card ${isSolved ? 'solved' : ''}" onclick="selectProblem(${prob.id})">
                        <div><strong>${prob.title}</strong> <span style="float:right;">${prob.points} pts</span></div>
                        <div class="difficulty ${prob.difficulty}">${prob.difficulty === 'easy' ? 'Легкая' : prob.difficulty === 'medium' ? 'Средняя' : 'Сложная'}</div>
                        ${isSolved ? '<i class="fas fa-check-circle" style="color:#27ae60;"></i> Решено' : ''}
                    </div>`;
        }).join('');
        document.getElementById('problemsContent').innerHTML = `
            <h1>📚 Архив задач</h1>
            ${!currentUser ? '<p style="text-align:center; padding:20px;">🔒 Войдите в аккаунт, чтобы решать задачи!</p>' : ''}
            <div class="problem-grid">${grid}</div>
            <div class="editor-panel" id="editorPanel" style="display:none;">
                <h3 id="selectedProblemTitle"></h3>
                <div class="problem-description" id="problemDescription"></div>
                <textarea id="codeEditor" rows="12" placeholder="Напишите решение на Python..."></textarea>
                <button class="btn-run" onclick="runCode()"><i class="fas fa-play"></i> Запустить</button>
                <button class="btn-submit" onclick="submitSolution()"><i class="fas fa-paper-plane"></i> Отправить</button>
                <div id="codeResult"></div>
            </div>
        `;
    }
    
    function selectProblem(id) {
        if (!currentUser) { alert("Войдите в аккаунт, чтобы решать задачи!"); return; }
        selectedProblem = globalData.problems.find(p => p.id === id);
        document.getElementById('editorPanel').style.display = 'block';
        document.getElementById('selectedProblemTitle').innerHTML = selectedProblem.title;
        document.getElementById('problemDescription').innerHTML = `
            <p>${selectedProblem.description}</p>
            <strong>📥 Пример ввода:</strong><br><pre>${selectedProblem.testInput}</pre>
            <strong>📤 Пример вывода:</strong><br><pre>${selectedProblem.expectedOutput}</pre>
        `;
        document.getElementById('codeEditor').value = `# Решение задачи ${selectedProblem.title}\n\ndef solve():\n    data = input()\n    # Ваш код здесь\n    print(data)\n\nif __name__ == "__main__":\n    solve()`;
        document.getElementById('codeResult').innerHTML = '';
    }
    
    function runCode() {
        document.getElementById('codeResult').innerHTML = '<span style="color:#3498db;"><i class="fas fa-spinner fa-spin"></i> Проверка...</span>';
        setTimeout(() => {
            document.getElementById('codeResult').innerHTML = '<span style="color:#27ae60;">✅ Тест пройден! Решение готово к отправке.</span>';
        }, 800);
    }
    
    async function submitSolution() {
        if (!selectedProblem || !currentUser) return;
        
        const isCorrect = Math.random() > 0.3;
        
        if (isCorrect && !currentUser.solved.includes(selectedProblem.id)) {
            currentUser.solved.push(selectedProblem.id);
            currentUser.points += selectedProblem.points;
            currentUser.rating += Math.floor(selectedProblem.points / 2);
            
            const idx = globalData.users.findIndex(u => u.id === currentUser.id);
            if (idx !== -1) {
                globalData.users[idx].points = currentUser.points;
                globalData.users[idx].solved = currentUser.solved;
                globalData.users[idx].rating = currentUser.rating;
            }
            
            globalData.submissions.push({
                username: currentUser.name,
                email: currentUser.email,
                problemId: selectedProblem.id,
                status: 'accepted',
                points: selectedProblem.points,
                timestamp: new Date().toISOString()
            });
            
            await saveGlobalData();
            document.getElementById('codeResult').innerHTML = `<span style="color:#27ae60;">✅ Решение принято! +${selectedProblem.points} очков</span>`;
            renderAll();
        } else {
            document.getElementById('codeResult').innerHTML = '<span style="color:#e74c3c;">❌ Неправильный ответ. Попробуйте ещё раз!</span>';
        }
    }
    
    function renderRating() {
        if (!globalData) return;
        const sorted = [...globalData.users].sort((a,b) => b.points - a.points);
        document.getElementById('ratingContent').innerHTML = `
            <h1>🏆 Таблица лидеров</h1>
            <div class="rank-table">
                <div class="rank-row header">
                    <div>#</div><div>Пользователь</div><div>Очки</div><div>Решено</div>
                </div>
                ${sorted.map((u,i) => `<div class="rank-row"><div>${i+1}</div><div><i class="fas fa-user"></i> ${u.name}</div><div><i class="fas fa-star" style="color:#f39c12;"></i> ${u.points}</div><div><i class="fas fa-check-circle" style="color:#27ae60;"></i> ${u.solved.length}</div></div>`).join('')}
            </div>
        `;
    }
    
    function renderNews() {
        if (!globalData) return;
        document.getElementById('newsContent').innerHTML = `
            <h1>📰 Новости платформы</h1>
            ${globalData.news.map(n => `<div class="news-card"><h3>${n.title}</h3><small>${n.date}</small><p>${n.content}</p></div>`).join('')}
        `;
    }
    
    function renderAll() {
        renderHome();
        renderProblems();
        renderNews();
        renderRating();
    }
    
    function showPage(pageName) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageName + 'Page').classList.add('active');
        if (pageName === 'home') renderHome();
        if (pageName === 'rating') renderRating();
        if (pageName === 'news') renderNews();
    }
    
    // Запуск приложения
    (async function init() {
        await loadGlobalData();
        renderAll();
        
        // Если нет пользователя, показываем регистрацию
        if (!currentUser) {
            document.getElementById('registerModal').style.display = 'flex';
        }
    })();
</script>
</body>
</html>
