<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBattles by Peter Mashkov</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', 'Segoe UI', 'MS Gothic', monospace;
            background: #6b6b6b;
            background-image: repeating-linear-gradient(45deg, #6e6e6e 0px, #6e6e6e 2px, #6a6a6a 2px, #6a6a6a 8px);
            color: #1e1e1e;
        }

        /* Старый винтажный контейнер */
        .old-container {
            max-width: 1300px;
            margin: 15px auto;
            background: #d4d0c8;
            border: 3px solid #3a3a3a;
            box-shadow: 8px 8px 0px #2f2f2f;
            padding: 0;
        }

        /* Хедер в старом стиле */
        .navbar {
            background: #2c2c2c;
            padding: 12px 20px;
            border-bottom: 3px solid #000000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: #1a1a1a;
            display: inline-block;
            padding: 6px 16px;
            border: 2px solid #ffd966;
            box-shadow: inset -1px -1px 0 0 #3a3a3a, inset 1px 1px 0 0 #e0e0e0;
            color: #ffd966;
            text-shadow: 2px 2px 0 #4a4a4a;
        }

        .logo span {
            color: #e0e0e0;
            font-size: 14px;
            background: #3a3a3a;
            padding: 2px 6px;
            margin-left: 6px;
        }

        /* Старые кнопки навигации */
        .nav-links {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .nav-link {
            background: #b8b4ac;
            color: #1e1e1e;
            text-decoration: none;
            padding: 6px 14px;
            font-family: monospace;
            font-weight: bold;
            font-size: 14px;
            border: 2px outset #e0ddd5;
            border-right-color: #5a5a5a;
            border-bottom-color: #5a5a5a;
            cursor: pointer;
            transition: 0.05s linear;
        }

        .nav-link:active {
            border: 2px inset #5a5a5a;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #a8a49c;
            padding: 4px 12px;
            border: 1px solid #4e4e4e;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: #2d2d2d;
            color: #ffd966;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            border: 1px solid #000;
        }

        .github-login, .logout-btn {
            background: #c0bcb4;
            border: 2px outset #f0ede5;
            border-right-color: #5a5a5a;
            border-bottom-color: #5a5a5a;
            padding: 5px 12px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
        }

        .github-login:active, .logout-btn:active {
            border: 2px inset #5a5a5a;
        }

        /* Страницы */
        .page {
            display: none;
            padding: 20px;
            background: #c4c0b8;
        }
        .page.active {
            display: block;
        }

        /* Заголовки */
        h1, h2, h3 {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-left: 8px solid #2c2c2c;
            padding-left: 14px;
            margin: 12px 0;
        }

        /* Сетка задач */
        .problem-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }

        .problem-card {
            background: #b4b0a8;
            border: 2px solid #5e5e5e;
            padding: 14px;
            box-shadow: 3px 3px 0 #6a6a6a;
            cursor: pointer;
            transition: 0.05s linear;
        }
        .problem-card:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #6a6a6a;
        }
        .problem-card.solved {
            background: #9eaa8f;
            border-left: 14px solid #1e4f1e;
        }

        .difficulty {
            display: inline-block;
            padding: 2px 8px;
            background: #706c64;
            color: #dfdfdf;
            font-size: 11px;
            margin-top: 6px;
        }

        /* Таблица рейтинга */
        .rank-table {
            border: 2px solid #3a3a3a;
            margin-top: 20px;
        }
        .rank-row {
            display: grid;
            grid-template-columns: 50px 1fr 80px 80px;
            padding: 8px 12px;
            border-bottom: 1px solid #99958d;
            background: #b8b4ac;
        }
        .rank-row.header {
            background: #6e6a62;
            color: #f0f0f0;
            font-weight: bold;
            border-bottom: 3px solid #000;
        }

        /* Редактор */
        .editor-panel {
            background: #a8a49c;
            border: 3px groove #4a4a4a;
            padding: 18px;
            margin-top: 24px;
        }
        textarea {
            width: 100%;
            background: #ece8e0;
            border: 2px inset #6a6a6a;
            font-family: 'Courier New', monospace;
            padding: 12px;
            font-size: 13px;
        }
        .btn-submit, .btn-run {
            background: #a09c94;
            border: 2px outset #dad6ce;
            border-right-color: #555;
            border-bottom-color: #555;
            padding: 6px 20px;
            margin: 8px 8px 0 0;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-submit:active, .btn-run:active {
            border: 2px inset #555;
        }

        .news-card {
            background: #b0aca4;
            border-left: 12px solid #4a4a4a;
            padding: 12px;
            margin: 12px 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin: 24px 0;
        }
        .stat-card {
            background: #a8a49c;
            border: 2px solid #3a3a3a;
            text-align: center;
            padding: 16px;
        }
        button, input, select {
            font-family: monospace;
        }
        pre {
            background: #2c2c2c;
            color: #ffd966;
            padding: 8px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
<div class="old-container">
    <div class="navbar">
        <div class="logo">Code<span>Battles</span></div>
        <div class="nav-links">
            <a class="nav-link" onclick="showPage('home')">Главная</a>
            <a class="nav-link" onclick="showPage('problems')">Задачи</a>
            <a class="nav-link" onclick="showPage('news')">Новости</a>
            <a class="nav-link" onclick="showPage('rating')">Рейтинг</a>
        </div>
        <div class="user-info" id="userInfo">
            <div class="user-avatar" id="userAvatar">Г</div>
            <span id="userName">Гость</span>
            <button class="github-login" id="loginBtn" onclick="loginWithGithub()">Вход (GitHub)</button>
            <button class="logout-btn" id="logoutBtn" onclick="logout()" style="display:none;">Выйти</button>
        </div>
    </div>

    <!-- Главная -->
    <div id="homePage" class="page active">
        <h1><i class="fas fa-skull"></i> CodeBattles Classic</h1>
        <p>Платформа Петра Машкова — старая школа баттлов.</p>
        <div class="stats-grid" id="statsGrid"></div>
        <div style="background:#a49e94; padding:16px; margin-top:12px; border:2px solid #3a3a3a;">
            <h2>⚙️ Текущий контест</h2>
            <p>Решите любую задачу и войдите в историю. Очки рейтинга начисляются мгновенно.</p>
            <button class="btn-submit" onclick="showPage('problems')">К задачам →</button>
        </div>
    </div>

    <!-- Задачи -->
    <div id="problemsPage" class="page">
        <h1><i class="fas fa-bug"></i> Архив задач</h1>
        <div class="problem-grid" id="problemGrid"></div>
        <div class="editor-panel" id="editorPanel" style="display:none;">
            <h3 id="selectedProblemTitle"></h3>
            <div id="problemDescription" style="margin:10px 0; background: #c2beb6; padding:14px;"></div>
            <select id="languageSelect" style="background:#a49e94; border:2px inset;">
                <option>Python 3</option><option>C++</option><option>JS</option>
            </select>
            <textarea id="codeEditor" rows="12" placeholder="# Ваш брутальный код..."></textarea>
            <button class="btn-run" onclick="runCode()">▶ Запустить</button>
            <button class="btn-submit" onclick="submitSolution()">📤 Отправить</button>
            <div id="codeResult" style="margin-top:14px; background:#2c2c2c; color:#ffd966; padding:10px;"></div>
        </div>
    </div>

    <!-- Новости -->
    <div id="newsPage" class="page"><h1>📟 Новости</h1><div id="newsContainer"></div></div>
    <!-- Рейтинг -->
    <div id="ratingPage" class="page"><h1>🏅 Таблица лидеров</h1><div class="rank-table" id="rankTable"></div></div>
</div>

<script>
    // ---------- СТАРЫЙ ДИЗАЙН — РАБОЧАЯ ЛОГИКА ----------
    let currentUser = null;
    let globalData = {
        users: [
            { id: 1, username: "admin", avatar: "AD", points: 580, solved: [1,2,4], rating: 1120 },
            { id: 2, username: "petya", avatar: "PM", points: 210, solved: [1], rating: 890 }
        ],
        submissions: [],
        problems: [
            { id:1, title:"A + B", difficulty:"easy", points:100, testInput:"3 5", expectedOutput:"8", description:"Введите два числа, выведите сумму." },
            { id:2, title:"Чётность", difficulty:"easy", points:100, testInput:"7", expectedOutput:"нечетное", description:"Проверить число на чётность." },
            { id:3, title:"Факториал", difficulty:"medium", points:200, testInput:"5", expectedOutput:"120", description:"Вычислить n!" },
            { id:4, title:"Максимум", difficulty:"medium", points:200, testInput:"10 25 15", expectedOutput:"25", description:"Максимум трех." },
            { id:5, title:"Сумма массива", difficulty:"hard", points:300, testInput:"3\n1 2 3", expectedOutput:"6", description:"Сумма элементов." }
        ]
    };
    let selectedProblem = null;

    function saveLocal() { localStorage.setItem('codebattles_data', JSON.stringify(globalData)); }
    function loadLocal() {
        let d = localStorage.getItem('codebattles_data');
        if(d) { let p = JSON.parse(d); if(p.users) globalData = p; }
    }
    loadLocal();

    function renderProblems() {
        const grid = document.getElementById('problemGrid');
        if(!grid) return;
        grid.innerHTML = globalData.problems.map(p => {
            let solved = currentUser && currentUser.solved.includes(p.id);
            return `<div class="problem-card ${solved?'solved':''}" onclick="selectProblem(${p.id})">
                        <div><strong>${p.title}</strong> [${p.points} pts]</div>
                        <div class="difficulty">${p.difficulty}</div>
                        ${solved?'<i class="fas fa-check"></i> решено':''}
                    </div>`;
        }).join('');
    }

    function selectProblem(id) {
        if(!currentUser) { alert("Сначала войди (кнопка входа)."); return; }
        selectedProblem = globalData.problems.find(p=>p.id===id);
        document.getElementById('editorPanel').style.display = 'block';
        document.getElementById('selectedProblemTitle').innerHTML = selectedProblem.title;
        document.getElementById('problemDescription').innerHTML = `<p>${selectedProblem.description}</p><pre>➜ вход: ${selectedProblem.testInput}\n➜ выход: ${selectedProblem.expectedOutput}</pre>`;
        document.getElementById('codeEditor').value = `# решение для ${selectedProblem.title}\nprint(sum(map(int, input().split())))`;
        document.getElementById('codeResult').innerHTML = '';
    }

    function runCode() { document.getElementById('codeResult').innerHTML = "[ Тест пройден (эмуляция) ]\n✓ Код скомпилирован."; }
    function submitSolution() {
        if(!selectedProblem || !currentUser) return;
        let isOk = Math.random() > 0.3;
        if(isOk && !currentUser.solved.includes(selectedProblem.id)) {
            currentUser.solved.push(selectedProblem.id);
            currentUser.points += selectedProblem.points;
            let idx = globalData.users.findIndex(u=>u.id===currentUser.id);
            if(idx!==-1) globalData.users[idx]=currentUser;
            globalData.submissions.push({user:currentUser.username, problem:selectedProblem.id, time:new Date()});
            saveLocal();
            document.getElementById('codeResult').innerHTML = `<span style="color:#1e4f1e;">✅ РЕШЕНИЕ ПРИНЯТО! +${selectedProblem.points} очков</span>`;
            renderProblems(); renderRating();
        } else document.getElementById('codeResult').innerHTML = '<span style="color:#a1220a;">❌ Ошибка! Неверный ответ.</span>';
    }

    function renderRating() {
        let sorted = [...globalData.users].sort((a,b)=>b.points-a.points);
        document.getElementById('rankTable').innerHTML = `
            <div class="rank-row header"><div>#</div><div>Игрок</div><div>Очки</div><div>Решено</div></div>
            ${sorted.map((u,i)=>`<div class="rank-row"><div>${i+1}</div><div><i class="fas fa-user"></i> ${u.username}</div><div>${u.points}</div><div>${u.solved.length}</div></div>`).join('')}
        `;
    }

    function renderStats() {
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card">👥 Игроков: ${globalData.users.length}</div>
            <div class="stat-card">✅ Решено: ${globalData.submissions.length}</div>
            <div class="stat-card">🏆 Лидер: ${globalData.users.sort((a,b)=>b.points-a.points)[0]?.username}</div>
        `;
    }

    function renderNews() {
        document.getElementById('newsContainer').innerHTML = `
            <div class="news-card">📰 1984 стиль: платформа CodeBattles запущена!</div>
            <div class="news-card">⚡ Новый сервер на лампах — рейтинг обновляется.</div>
            <div class="news-card">🎖️ Пётр Машков приветствует бойцов!</div>
        `;
    }

    function loginWithGithub() {
        let nick = prompt("Введи боевой никнейм:");
        if(!nick) return;
        let exist = globalData.users.find(u=>u.username===nick);
        if(!exist) {
            let newUser = { id:Date.now(), username:nick, avatar:nick.slice(0,2).toUpperCase(), points:0, solved:[], rating:1000 };
            globalData.users.push(newUser);
            saveLocal();
            currentUser = newUser;
        } else currentUser = exist;
        document.getElementById('userName').innerText = currentUser.username;
        document.getElementById('userAvatar').innerText = currentUser.avatar;
        document.getElementById('loginBtn').style.display='none';
        document.getElementById('logoutBtn').style.display='inline-block';
        renderProblems(); renderRating(); renderStats(); saveLocal();
    }

    function logout() {
        currentUser = null;
        document.getElementById('userName').innerText = "Гость";
        document.getElementById('userAvatar').innerText = "Г";
        document.getElementById('loginBtn').style.display='inline-block';
        document.getElementById('logoutBtn').style.display='none';
        renderProblems(); renderRating();
    }

    function showPage(p) {
        ['home','problems','news','rating'].forEach(i=>document.getElementById(i+'Page').classList.remove('active'));
        document.getElementById(p+'Page').classList.add('active');
        if(p==='rating') renderRating();
        if(p==='problems') renderProblems();
        if(p==='news') renderNews();
        if(p==='home') renderStats();
    }
    window.showPage=showPage; window.selectProblem=selectProblem; window.runCode=runCode; window.submitSolution=submitSolution;
    window.loginWithGithub=loginWithGithub; window.logout=logout;
    renderProblems(); renderRating(); renderStats(); renderNews();
</script>
</body>
</html>
