<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CodeBattles | Платформа для программистов</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0c10;
            color: #e4e6eb;
        }
        .navbar {
            background: linear-gradient(135deg, #0f1117 0%, #1a1d26 100%);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #2a2d3a;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .logo span {
            color: #ffd700;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .nav-link {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: 0.3s;
            cursor: pointer;
            font-weight: 500;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(255,215,0,0.15);
            color: #ffd700;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ffd700;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #1a1a2e;
        }
        .github-login {
            background: #24292e;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .github-login:hover {
            background: #3a3f44;
        }
        .logout-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .logout-btn:hover {
            background: rgba(255,255,255,0.25);
        }
        .page {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
            min-height: calc(100vh - 80px);
        }
        .page.active {
            display: block;
        }
        .problem-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .problem-card {
            background: #13161f;
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: 0.2s;
            border-left: 4px solid #ffd700;
        }
        .problem-card.solved {
            border-left-color: #2ecc71;
            opacity: 0.85;
        }
        .problem-card:hover {
            transform: translateY(-3px);
            background: #1a1e2a;
        }
        .rank-table {
            background: #13161f;
            border-radius: 16px;
            overflow: hidden;
            margin-top: 20px;
        }
        .rank-row {
            display: grid;
            grid-template-columns: 60px 1fr 100px 100px;
            padding: 14px 20px;
            border-bottom: 1px solid #222530;
        }
        .rank-row.header {
            background: #ffd700;
            color: #0a0c10;
            font-weight: bold;
        }
        .editor-panel {
            background: #13161f;
            border-radius: 20px;
            padding: 25px;
            margin-top: 25px;
        }
        textarea {
            width: 100%;
            padding: 15px;
            background: #0c0f16;
            border: 1px solid #2a2d3a;
            border-radius: 12px;
            color: #e4e6eb;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin: 12px 0;
        }
        .btn-submit, .btn-run {
            padding: 10px 24px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 12px;
            transition: 0.2s;
        }
        .btn-submit {
            background: #2ecc71;
            color: #0a0c10;
        }
        .btn-run {
            background: #3498db;
            color: white;
        }
        .news-card {
            background: #13161f;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 18px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .stat-card {
            background: #13161f;
            padding: 24px;
            border-radius: 20px;
            text-align: center;
        }
        .loading {
            text-align: center;
            padding: 60px;
        }
        .difficulty {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            margin-top: 8px;
        }
        .easy { background: #2ecc7133; color: #2ecc71; }
        .medium { background: #f39c1233; color: #f39c12; }
        .hard { background: #e74c3c33; color: #e74c3c; }
        @media (max-width: 700px) {
            .navbar { flex-direction: column; }
            .rank-row { grid-template-columns: 40px 1fr 70px 70px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo" onclick="showPage('home')">Code<span>Battles</span></div>
    <div class="nav-links">
        <a class="nav-link" onclick="showPage('home')">Главная</a>
        <a class="nav-link" onclick="showPage('problems')">Задачи</a>
        <a class="nav-link" onclick="showPage('news')">Новости</a>
        <a class="nav-link" onclick="showPage('rating')">Рейтинг</a>
    </div>
    <div class="user-info" id="userInfo">
        <div class="user-avatar" id="userAvatar">?</div>
        <span id="userName">Гость</span>
        <button class="github-login" id="loginBtn" onclick="loginWithGithub()">
            <i class="fab fa-github"></i> GitHub вход
        </button>
        <button class="logout-btn" id="logoutBtn" onclick="logout()" style="display:none;">Выйти</button>
    </div>
</div>

<!-- Главная -->
<div id="homePage" class="page active">
    <h1><i class="fas fa-code"></i> CodeBattles Global</h1>
    <p style="margin: 15px 0 25px">Платформа для соревновательного программирования от Петра Машкова</p>
    <div class="stats-grid" id="statsGrid"></div>
    <div style="background: linear-gradient(135deg,#1e2a3a,#0f1117); padding:30px; border-radius:24px; margin-top:20px">
        <h2>🏆 Турнир недели</h2>
        <p>Реши задачи и попади в топ-10! Призы — рейтинговые очки и звание "Battle Master".</p>
        <button class="btn-submit" onclick="showPage('problems')">Участвовать →</button>
    </div>
</div>

<!-- Задачи -->
<div id="problemsPage" class="page">
    <h1><i class="fas fa-tasks"></i> Архив задач</h1>
    <div class="problem-grid" id="problemGrid"></div>
    <div class="editor-panel" id="editorPanel" style="display:none;">
        <h3 id="selectedProblemTitle"></h3>
        <div id="problemDescription" style="margin:15px 0; background:#0c0f16; padding:16px; border-radius:14px;"></div>
        <select id="languageSelect" style="background:#0c0f16; border:1px solid #2a2d3a; padding:8px; border-radius:8px; color:white;">
            <option value="python">Python 3</option>
            <option value="cpp">C++</option>
            <option value="javascript">JavaScript</option>
        </select>
        <textarea id="codeEditor" rows="12" placeholder="Напишите решение здесь..."></textarea>
        <button class="btn-run" onclick="runCode()"><i class="fas fa-play"></i> Запустить тесты</button>
        <button class="btn-submit" onclick="submitSolution()"><i class="fas fa-paper-plane"></i> Отправить решение</button>
        <div id="codeResult" style="margin-top: 16px;"></div>
    </div>
</div>

<!-- Новости -->
<div id="newsPage" class="page">
    <h1><i class="fas fa-newspaper"></i> Новости платформы</h1>
    <div id="newsContainer"></div>
</div>

<!-- Рейтинг -->
<div id="ratingPage" class="page">
    <h1><i class="fas fa-chart-line"></i> Таблица лидеров</h1>
    <div class="rank-table" id="rankTable"></div>
</div>

<script>
    // ---------- КОНФИГУРАЦИЯ ----------
    const WORKER_URL = 'https://codebattles-api.your-worker.workers.dev'; // ЗАМЕНИТЕ ПОСЛЕ ДЕПЛОЯ WORKER'А
    // Если пока нет Worker, используем демо-режим с localStorage (но с глобальной синхронизацией через JSON)
    const USE_WORKER = false;  // После деплоя Worker поставьте true и укажите URL выше
    
    // Глобальные данные
    let currentUser = null;
    let globalData = {
        users: [],
        submissions: [],
        problems: [
            { id:1, title:"A + B", difficulty:"easy", points:100, testInput:"3 5", expectedOutput:"8", description:"Даны A и B. Выведите A+B." },
            { id:2, title:"Четное или нечетное", difficulty:"easy", points:100, testInput:"7", expectedOutput:"нечетное", description:"Определите, четное число или нет." },
            { id:3, title:"Факториал", difficulty:"medium", points:200, testInput:"5", expectedOutput:"120", description:"Вычислите n! (n ≤ 10)." },
            { id:4, title:"Максимум трёх", difficulty:"medium", points:200, testInput:"10 25 15", expectedOutput:"25", description:"Найдите наибольшее из трёх чисел." },
            { id:5, title:"Сумма массива", difficulty:"hard", points:300, testInput:"3\n1 2 3", expectedOutput:"6", description:"Найдите сумму элементов массива." }
        ]
    };
    
    // Функции работы с API / Worker
    async function loadGlobalData() {
        if (USE_WORKER && WORKER_URL !== 'https://codebattles-api.your-worker.workers.dev') {
            try {
                const res = await fetch(`${WORKER_URL}/api/data`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.users) globalData.users = data.users;
                    if (data.submissions) globalData.submissions = data.submissions;
                }
            } catch(e) { console.warn("Worker недоступен, использую локальное хранилище"); }
        } else {
            // Локальное хранилище (общее для всех устройств только если импортируют JSON)
            const saved = localStorage.getItem('codebattles_global');
            if (saved) {
                const parsed = JSON.parse(saved);
                if (parsed.users) globalData.users = parsed.users;
                if (parsed.submissions) globalData.submissions = parsed.submissions;
            }
        }
        // Если нет пользователей — создаём демо-админа
        if (globalData.users.length === 0) {
            globalData.users.push({
                id: 1,
                username: "admin",
                github_id: null,
                avatar: "AD",
                points: 420,
                solved: [1,2],
                rating: 1100
            });
            globalData.users.push({
                id: 2,
                username: "coder2024",
                github_id: null,
                avatar: "C24",
                points: 280,
                solved: [1,3],
                rating: 980
            });
            saveGlobalData();
        }
    }
    
    async function saveGlobalData() {
        if (USE_WORKER && WORKER_URL !== 'https://codebattles-api.your-worker.workers.dev') {
            await fetch(`${WORKER_URL}/api/data`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ users: globalData.users, submissions: globalData.submissions })
            });
        } else {
            localStorage.setItem('codebattles_global', JSON.stringify({ users: globalData.users, submissions: globalData.submissions }));
        }
    }
    
    // GitHub OAuth (имитация открытия окна)
    function loginWithGithub() {
        // Реальная интеграция GitHub OAuth потребует создания OAuth App и редиректа
        // Для демонстрации глобальных данных — используем простую регистрацию по нику
        let username = prompt("Введите ваш никнейм для CodeBattles:");
        if (username && username.trim()) {
            let existing = globalData.users.find(u => u.username === username);
            if (!existing) {
                let newUser = {
                    id: Date.now(),
                    username: username,
                    github_id: null,
                    avatar: username.slice(0,2).toUpperCase(),
                    points: 0,
                    solved: [],
                    rating: 1000
                };
                globalData.users.push(newUser);
                saveGlobalData();
                currentUser = newUser;
            } else {
                currentUser = existing;
            }
            updateUIAfterLogin();
            renderAll();
        }
    }
    
    function updateUIAfterLogin() {
        document.getElementById('userName').innerText = currentUser.username;
        document.getElementById('userAvatar').innerText = currentUser.avatar;
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('logoutBtn').style.display = 'inline-block';
    }
    
    function logout() {
        currentUser = null;
        document.getElementById('userName').innerText = "Гость";
        document.getElementById('userAvatar').innerText = "?";
        document.getElementById('loginBtn').style.display = 'inline-block';
        document.getElementById('logoutBtn').style.display = 'none';
        renderAll();
        showPage('home');
    }
    
    // Отображение задач
    function renderProblems() {
        const grid = document.getElementById('problemGrid');
        if (!grid) return;
        grid.innerHTML = globalData.problems.map(prob => {
            const isSolved = currentUser && currentUser.solved.includes(prob.id);
            return `<div class="problem-card ${isSolved ? 'solved' : ''}" onclick="selectProblem(${prob.id})">
                        <div class="problem-title"><strong>${prob.title}</strong></div>
                        <div class="difficulty ${prob.difficulty}">${prob.difficulty === 'easy' ? 'Легкая' : prob.difficulty === 'medium' ? 'Средняя' : 'Сложная'}</div>
                        <div><i class="fas fa-star"></i> ${prob.points} очков</div>
                        ${isSolved ? '<i class="fas fa-check-circle" style="color:#2ecc71;"></i>' : ''}
                    </div>`;
        }).join('');
    }
    
    let selectedProblem = null;
    function selectProblem(id) {
        if (!currentUser) { alert("Войдите через GitHub или введите ник!"); return; }
        selectedProblem = globalData.problems.find(p => p.id === id);
        document.getElementById('editorPanel').style.display = 'block';
        document.getElementById('selectedProblemTitle').innerHTML = selectedProblem.title;
        document.getElementById('problemDescription').innerHTML = `
            <p>${selectedProblem.description}</p>
            <strong>Пример ввода:</strong><br><pre>${selectedProblem.testInput}</pre>
            <strong>Пример вывода:</strong><br><pre>${selectedProblem.expectedOutput}</pre>
        `;
        document.getElementById('codeEditor').value = `# Решение задачи ${selectedProblem.title}\n# Напишите код на Python\n\ndef solve():\n    data = input()\n    # Ваш код\n    print(data)\n\nif __name__ == "__main__":\n    solve()`;
        document.getElementById('codeResult').innerHTML = '';
    }
    
    function runCode() {
        document.getElementById('codeResult').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Проверка...';
        setTimeout(() => {
            document.getElementById('codeResult').innerHTML = '<span style="color:#2ecc71;">✓ Тесты пройдены (эмуляция)</span><br>Решение готово к отправке.';
        }, 800);
    }
    
    async function submitSolution() {
        if (!currentUser || !selectedProblem) return;
        const code = document.getElementById('codeEditor').value;
        if (!code.trim()) { alert("Напишите код решения"); return; }
        
        // Эмуляция проверки (рандом, но в бою тут будет реальная компиляция)
        const isCorrect = Math.random() > 0.25;
        if (isCorrect && !currentUser.solved.includes(selectedProblem.id)) {
            currentUser.solved.push(selectedProblem.id);
            currentUser.points += selectedProblem.points;
            currentUser.rating += selectedProblem.points / 10;
            
            // Обновляем глобально
            const idx = globalData.users.findIndex(u => u.id === currentUser.id);
            if (idx !== -1) globalData.users[idx] = currentUser;
            globalData.submissions.push({
                username: currentUser.username,
                problemId: selectedProblem.id,
                status: 'accepted',
                timestamp: new Date().toISOString()
            });
            await saveGlobalData();
            document.getElementById('codeResult').innerHTML = `<span style="color:#2ecc71;">✅ Решение принято! +${selectedProblem.points} очков</span>`;
            renderProblems();
            renderRating();
        } else {
            document.getElementById('codeResult').innerHTML = '<span style="color:#e74c3c;">❌ Неправильный ответ. Попробуйте ещё.</span>';
        }
    }
    
    function renderRating() {
        const sorted = [...globalData.users].sort((a,b) => b.points - a.points);
        const tableDiv = document.getElementById('rankTable');
        if (!tableDiv) return;
        tableDiv.innerHTML = `
            <div class="rank-row header">
                <div>#</div><div>Пользователь</div><div>Очки</div><div>Решено</div>
            </div>
            ${sorted.map((u, i) => `
                <div class="rank-row">
                    <div>${i+1}</div>
                    <div><i class="fas fa-user"></i> ${u.username}</div>
                    <div><i class="fas fa-star" style="color:#ffd700;"></i> ${u.points}</div>
                    <div><i class="fas fa-check-circle"></i> ${u.solved.length}</div>
                </div>
            `).join('')}
        `;
    }
    
    function renderStats() {
        const statsDiv = document.getElementById('statsGrid');
        if (!statsDiv) return;
        const totalSolved = globalData.submissions.filter(s => s.status === 'accepted').length;
        statsDiv.innerHTML = `
            <div class="stat-card"><i class="fas fa-users fa-2x"></i><h3>${globalData.users.length}</h3><p>участников</p></div>
            <div class="stat-card"><i class="fas fa-check-circle fa-2x"></i><h3>${totalSolved}</h3><p>решений</p></div>
            <div class="stat-card"><i class="fas fa-trophy fa-2x"></i><h3>${Math.max(...globalData.users.map(u=>u.points),0)}</h3><p>макс. очков</p></div>
        `;
    }
    
    function renderNews() {
        const newsContainer = document.getElementById('newsContainer');
        if (!newsContainer) return;
        const newsItems = [
            { title:"🚀 Запуск CodeBattles!", date:"15.04.2025", content:"Глобальная платформа для баттлов кода открыта! Вход через GitHub и полный рейтинг." },
            { title:"🏆 Первый турнир", date:"18.04.2025", content:"Соревнование на 500 очков. Решай задачи и становись чемпионом." },
            { title:"📊 Обновление", date:"сегодня", content:"Добавлена таблица лидеров в реальном времени." }
        ];
        newsContainer.innerHTML = newsItems.map(n => `
            <div class="news-card">
                <h3>${n.title}</h3>
                <small>${n.date}</small><br><br>
                <p>${n.content}</p>
            </div>
        `).join('');
    }
    
    function showPage(pageName) {
        const pages = ['home', 'problems', 'news', 'rating'];
        pages.forEach(p => {
            const el = document.getElementById(p + 'Page');
            if (el) el.classList.remove('active');
        });
        document.getElementById(pageName + 'Page').classList.add('active');
        if (pageName === 'rating') renderRating();
        if (pageName === 'problems') renderProblems();
        if (pageName === 'news') renderNews();
        if (pageName === 'home') renderStats();
    }
    
    async function renderAll() {
        await loadGlobalData();
        renderProblems();
        renderRating();
        renderStats();
        renderNews();
        if (currentUser) updateUIAfterLogin();
    }
    
    // Проверка авторизации при загрузке
    window.onload = async () => {
        await renderAll();
        // Если есть сохранённый пользователь в localStorage
        const savedUser = localStorage.getItem('codebattles_current_user');
        if (savedUser) {
            try {
                let userObj = JSON.parse(savedUser);
                let found = globalData.users.find(u => u.id === userObj.id);
                if (found) {
                    currentUser = found;
                    updateUIAfterLogin();
                    renderAll();
                }
            } catch(e) {}
        }
    };
    
    // Сохраняем текущего пользователя при изменениях
    function updateUIAfterLogin() {
        document.getElementById('userName').innerText = currentUser.username;
        document.getElementById('userAvatar').innerText = currentUser.avatar;
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('logoutBtn').style.display = 'inline-block';
        localStorage.setItem('codebattles_current_user', JSON.stringify({ id: currentUser.id, username: currentUser.username }));
    }
    
    window.logout = logout;
    window.loginWithGithub = loginWithGithub;
    window.showPage = showPage;
    window.selectProblem = selectProblem;
    window.runCode = runCode;
    window.submitSolution = submitSolution;
</script>
</body>
</html>
