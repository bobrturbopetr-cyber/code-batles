<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBattles | Глобальная платформа</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #eee; }
        .header { background: linear-gradient(135deg, #0f0f23 0%, #16213e 100%); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; border-bottom: 3px solid #e94560; }
        .logo { font-size: 28px; font-weight: bold; }
        .logo span { color: #e94560; }
        .nav-links { display: flex; gap: 10px; }
        .nav-link { color: white; padding: 8px 18px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: #e94560; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #e94560; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .login-btn, .logout-btn { background: #e94560; border: none; padding: 8px 20px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer; }
        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        .page { display: none; }
        .page.active { display: block; }
        .problem-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin: 20px 0; }
        .problem-card { background: #16213e; border-radius: 12px; padding: 20px; cursor: pointer; transition: 0.2s; border-left: 4px solid #e94560; }
        .problem-card.solved { border-left-color: #2ecc71; background: #1a2a3a; }
        .problem-card:hover { transform: translateY(-3px); }
        .difficulty { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; margin: 8px 0; }
        .easy { background: #2ecc71; color: #1a1a2e; }
        .medium { background: #f39c12; color: #1a1a2e; }
        .hard { background: #e74c3c; color: white; }
        .editor-panel { background: #16213e; border-radius: 12px; padding: 25px; margin-top: 20px; }
        textarea { width: 100%; padding: 15px; background: #0f0f23; border: 1px solid #2a2a4a; border-radius: 8px; color: white; font-family: monospace; margin: 10px 0; }
        .btn-submit, .btn-run { padding: 10px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-right: 10px; }
        .btn-submit { background: #2ecc71; color: #1a1a2e; }
        .btn-run { background: #3498db; color: white; }
        .rank-table { background: #16213e; border-radius: 12px; overflow: hidden; margin-top: 20px; }
        .rank-row { display: grid; grid-template-columns: 60px 1fr 100px 100px; padding: 12px 20px; border-bottom: 1px solid #2a2a4a; }
        .rank-row.header { background: #e94560; color: white; font-weight: bold; }
        .stat-card { background: #16213e; padding: 20px; border-radius: 12px; text-align: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 20px 0; }
        .news-card { background: #16213e; padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: #16213e; padding: 30px; border-radius: 16px; width: 350px; }
        .modal-content input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: none; }
        @media (max-width: 700px) { .header { flex-direction: column; text-align: center; } .rank-row { grid-template-columns: 40px 1fr 70px 70px; font-size: 12px; } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Code<span>Battles</span></div>
    <div class="nav-links">
        <a class="nav-link" onclick="showPage('home')">Главная</a>
        <a class="nav-link" onclick="showPage('problems')">Задачи</a>
        <a class="nav-link" onclick="showPage('news')">Новости</a>
        <a class="nav-link" onclick="showPage('rating')">Рейтинг</a>
    </div>
    <div class="user-info" id="userInfo">
        <div class="user-avatar" id="userAvatar">Г</div>
        <span id="userName">Гость</span>
        <button class="login-btn" id="loginBtn" onclick="openLoginModal()">Вход</button>
        <button class="logout-btn" id="logoutBtn" onclick="logout()" style="display:none;">Выйти</button>
    </div>
</div>

<div class="container">
    <div id="homePage" class="page active"><div id="homeContent"></div></div>
    <div id="problemsPage" class="page"><div id="problemsContent"></div></div>
    <div id="newsPage" class="page"><div id="newsContent"></div></div>
    <div id="ratingPage" class="page"><div id="ratingContent"></div></div>
</div>

<div id="loginModal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>Вход в CodeBattles</h3>
        <input type="text" id="loginUsername" placeholder="Имя пользователя">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button class="btn-submit" onclick="login()" style="width:100%; margin:5px 0;">Войти</button>
        <button class="btn-run" onclick="showRegister()" style="width:100%; margin:5px 0;">Регистрация</button>
        <button onclick="closeLoginModal()" style="width:100%; margin:5px 0; padding:8px;">Отмена</button>
        <div id="loginMsg" style="color:#e74c3c; margin-top:10px; text-align:center;"></div>
    </div>
</div>

<div id="registerModal" class="modal" style="display:none;">
    <div class="modal-content">
        <h3>Регистрация</h3>
        <input type="text" id="regUsername" placeholder="Имя пользователя">
        <input type="password" id="regPassword" placeholder="Пароль">
        <input type="password" id="regConfirm" placeholder="Подтвердите пароль">
        <button class="btn-submit" onclick="register()" style="width:100%; margin:5px 0;">Зарегистрироваться</button>
        <button onclick="closeRegisterModal()" style="width:100%; margin:5px 0; padding:8px;">Назад</button>
        <div id="regMsg" style="color:#e74c3c; margin-top:10px; text-align:center;"></div>
    </div>
</div>

<script>
    // ===== JSONBIN — ГЛОБАЛЬНОЕ ХРАНИЛИЩЕ =====
    const JSONBIN_BIN_ID = "67c9f8e8ad19ca34f813add6";
    const JSONBIN_KEY = "$2a$10$upYPKLN3bcEbEuxmp.FS5OkJVaI42lsyjbqM/RubkWKNbtx2KRUlS";
    
    let currentUser = null;
    let globalData = null;
    
    async function loadGlobalData() {
        try {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                headers: { 'X-Master-Key': JSONBIN_KEY }
            });
            const data = await response.json();
            globalData = data.record;
            if (!globalData.users) initDefaultData();
            console.log("✅ Данные загружены из облака");
        } catch(error) { initDefaultData(); }
    }
    
    function initDefaultData() {
        globalData = {
            users: [
                { id: 1, username: "admin", password: "admin", avatar: "AD", points: 580, solved: [1,2,4], rating: 1120 },
                { id: 2, username: "petya", password: "123", avatar: "PE", points: 210, solved: [1], rating: 890 }
            ],
            submissions: [],
            problems: [
                { id:1, title:"A + B", difficulty:"easy", points:100, testInput:"3 5", expectedOutput:"8", description:"Даны два числа. Найдите их сумму." },
                { id:2, title:"Четное или нечетное", difficulty:"easy", points:100, testInput:"7", expectedOutput:"нечетное", description:"Проверьте четность числа." },
                { id:3, title:"Факториал", difficulty:"medium", points:200, testInput:"5", expectedOutput:"120", description:"Вычислите n! (n ≤ 10)." },
                { id:4, title:"Максимум трех", difficulty:"medium", points:200, testInput:"10 25 15", expectedOutput:"25", description:"Найдите максимум." },
                { id:5, title:"Сумма массива", difficulty:"hard", points:300, testInput:"3\n1 2 3", expectedOutput:"6", description:"Сумма элементов массива." }
            ],
            news: [
                { title:"🎉 Добро пожаловать в CodeBattles!", date:"Сегодня", content:"Платформа запущена! Регистрируйтесь и решайте задачи." },
                { title:"🏆 Глобальный рейтинг", date:"Сегодня", content:"Все пользователи видят общую таблицу лидеров." }
            ]
        };
    }
    
    async function saveGlobalData() {
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_KEY },
                body: JSON.stringify(globalData)
            });
        } catch(e) { console.log(e); }
    }
    
    function openLoginModal() { document.getElementById('loginModal').style.display = 'flex'; }
    function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }
    function showRegister() { closeLoginModal(); document.getElementById('registerModal').style.display = 'flex'; }
    function closeRegisterModal() { document.getElementById('registerModal').style.display = 'none'; }
    
    async function login() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        const user = globalData.users.find(u => u.username === username && u.password === password);
        if (user) {
            currentUser = JSON.parse(JSON.stringify(user));
            delete currentUser.password;
            closeLoginModal();
            updateUI();
            renderAll();
        } else { document.getElementById('loginMsg').innerHTML = 'Неверный логин или пароль!'; }
    }
    
    async function register() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        if (!username || !password) { document.getElementById('regMsg').innerHTML = 'Заполните все поля!'; return; }
        if (password !== confirm) { document.getElementById('regMsg').innerHTML = 'Пароли не совпадают!'; return; }
        if (globalData.users.find(u => u.username === username)) { document.getElementById('regMsg').innerHTML = 'Пользователь уже существует!'; return; }
        
        const newUser = { id: Date.now(), username, password, avatar: username.slice(0,2).toUpperCase(), points: 0, solved: [], rating: 1000 };
        globalData.users.push(newUser);
        await saveGlobalData();
        currentUser = JSON.parse(JSON.stringify(newUser));
        delete currentUser.password;
        closeRegisterModal();
        updateUI();
        renderAll();
    }
    
    function logout() { currentUser = null; updateUI(); renderAll(); }
    function updateUI() {
        if (currentUser) {
            document.getElementById('userName').innerText = currentUser.username;
            document.getElementById('userAvatar').innerText = currentUser.avatar;
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
        } else {
            document.getElementById('userName').innerText = 'Гость';
            document.getElementById('userAvatar').innerText = 'Г';
            document.getElementById('loginBtn').style.display = 'inline-block';
            document.getElementById('logoutBtn').style.display = 'none';
        }
    }
    
    let selectedProblem = null;
    
    function renderHome() {
        document.getElementById('homeContent').innerHTML = `
            <h1>Добро пожаловать в CodeBattles!</h1>
            <div class="stats-grid">
                <div class="stat-card"><i class="fas fa-users fa-2x"></i><h3>${globalData.users.length}</h3><p>участников</p></div>
                <div class="stat-card"><i class="fas fa-check-circle fa-2x"></i><h3>${globalData.submissions.length}</h3><p>решено задач</p></div>
                <div class="stat-card"><i class="fas fa-trophy fa-2x"></i><h3>${Math.max(...globalData.users.map(u=>u.points),0)}</h3><p>макс очков</p></div>
            </div>
            ${currentUser ? `<div class="stat-card"><h3>Ваш профиль</h3><p>⭐ Очки: ${currentUser.points}</p><p>✅ Решено: ${currentUser.solved.length}</p><p>📊 Рейтинг: ${currentUser.rating}</p></div>` : '<p style="text-align:center; padding:40px;">🔒 Войдите, чтобы решать задачи!</p>'}
        `;
    }
    
    function renderProblems() {
        const grid = globalData.problems.map(prob => {
            const isSolved = currentUser && currentUser.solved.includes(prob.id);
            return `<div class="problem-card ${isSolved ? 'solved' : ''}" onclick="selectProblem(${prob.id})">
                        <div><strong>${prob.title}</strong> <span style="float:right;">${prob.points} pts</span></div>
                        <div class="difficulty ${prob.difficulty}">${prob.difficulty === 'easy' ? 'Легкая' : prob.difficulty === 'medium' ? 'Средняя' : 'Сложная'}</div>
                        ${isSolved ? '<i class="fas fa-check-circle" style="color:#2ecc71;"></i> Решено' : ''}
                    </div>`;
        }).join('');
        document.getElementById('problemsContent').innerHTML = `
            <h1>📚 Архив задач</h1>
            ${!currentUser ? '<p style="text-align:center; padding:20px;">🔒 Войдите в аккаунт, чтобы решать задачи!</p>' : ''}
            <div class="problem-grid">${grid}</div>
            <div class="editor-panel" id="editorPanel" style="display:none;">
                <h3 id="selectedProblemTitle"></h3>
                <div id="problemDescription"></div>
                <textarea id="codeEditor" rows="10" placeholder="Напишите решение..."></textarea>
                <button class="btn-run" onclick="runCode()">▶ Запустить</button>
                <button class="btn-submit" onclick="submitSolution()">📤 Отправить</button>
                <div id="codeResult"></div>
            </div>
        `;
    }
    
    function selectProblem(id) {
        if (!currentUser) { alert("Войдите в аккаунт!"); return; }
        selectedProblem = globalData.problems.find(p => p.id === id);
        document.getElementById('editorPanel').style.display = 'block';
        document.getElementById('selectedProblemTitle').innerHTML = selectedProblem.title;
        document.getElementById('problemDescription').innerHTML = `<p>${selectedProblem.description}</p><strong>Пример ввода:</strong><br><pre>${selectedProblem.testInput}</pre><strong>Пример вывода:</strong><br><pre>${selectedProblem.expectedOutput}</pre>`;
        document.getElementById('codeEditor').value = `# Решение задачи ${selectedProblem.title}\n\nprint(sum(map(int, input().split())))`;
        document.getElementById('codeResult').innerHTML = '';
    }
    
    function runCode() { document.getElementById('codeResult').innerHTML = '<span style="color:#3498db;">✅ Тест пройден!</span>'; }
    
    async function submitSolution() {
        if (!selectedProblem || !currentUser) return;
        const isCorrect = Math.random() > 0.3;
        if (isCorrect && !currentUser.solved.includes(selectedProblem.id)) {
            currentUser.solved.push(selectedProblem.id);
            currentUser.points += selectedProblem.points;
            const idx = globalData.users.findIndex(u => u.id === currentUser.id);
            if (idx !== -1) { globalData.users[idx].points = currentUser.points; globalData.users[idx].solved = currentUser.solved; }
            globalData.submissions.push({ username: currentUser.username, problemId: selectedProblem.id, timestamp: new Date() });
            await saveGlobalData();
            document.getElementById('codeResult').innerHTML = `<span style="color:#2ecc71;">✅ Решение принято! +${selectedProblem.points} очков</span>`;
            renderAll();
        } else { document.getElementById('codeResult').innerHTML = '<span style="color:#e74c3c;">❌ Неправильный ответ!</span>'; }
    }
    
    function renderRating() {
        const sorted = [...globalData.users].sort((a,b) => b.points - a.points);
        document.getElementById('ratingContent').innerHTML = `<h1>🏆 Таблица лидеров</h1><div class="rank-table"><div class="rank-row header"><div>#</div><div>Пользователь</div><div>Очки</div><div>Решено</div></div>${sorted.map((u,i)=>`<div class="rank-row"><div>${i+1}</div><div><i class="fas fa-user"></i> ${u.username}</div><div>${u.points}</div><div>${u.solved.length}</div></div>`).join('')}</div>`;
    }
    
    function renderNews() {
        document.getElementById('newsContent').innerHTML = `<h1>📰 Новости</h1>${globalData.news.map(n=>`<div class="news-card"><h3>${n.title}</h3><small>${n.date}</small><p>${n.content}</p></div>`).join('')}`;
    }
    
    function renderAll() { renderHome(); renderProblems(); renderNews(); renderRating(); }
    function showPage(p) { document.querySelectorAll('.page').forEach(pg=>pg.classList.remove('active')); document.getElementById(p+'Page').classList.add('active'); if(p=='home') renderHome(); if(p=='rating') renderRating(); if(p=='news') renderNews(); }
    
    (async function() { await loadGlobalData(); await saveGlobalData(); renderAll(); })();
</script>
</body>
</html>
